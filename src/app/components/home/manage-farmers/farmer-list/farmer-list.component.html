<div class="card shadow">
    <div class="card-header py-3">
        <div class="card-container">
            <a class="btn btn-primary btn-sm farmers-card-button" routerLink="../add-farmer" role="button" href="#"><i
                    class="fa fa-plus fa-sm text-white-50"></i>&nbsp;Add farmers</a>
        </div>
    </div>
    <div class="card-body">
        <form [formGroup]="farmerListForm">
            <div class="table-responsive table mt-2">
                <table class="table table-bordered my-0">
                    <thead>
                        <tr>
                            <th>First Name</th>
                            <th>Last Name</th>
                            <th>Email</th>
                            <th>Username</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr *ngFor="let farmer of farmers">
                            <td><img class="rounded-circle me-2" width="30" height="30"
                                    src="https://plantcare-app-bucket.s3.ap-southeast-1.amazonaws.com/HydroponicLogo.png"> {{ farmer.firstName }} </td>
                            <td> {{ farmer.lastName }} </td>
                            <td> {{ farmer.email }} </td>
                            <td> {{ farmer.username }} </td>
                            <td>
                                <button type="button" class="btn btn-danger action-button"
                                    (click)="onDeleteFarmer(farmer.id)" title="Remove farmer">Delete</button>
                            </td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td><strong>First Name</strong></td>
                            <td><strong>Last Name</strong></td>
                            <td><strong>Email</strong></td>
                            <td><strong>Username</strong></td>
                            <td><strong>Actions</strong></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
            
        </form>

    </div>
</div>
